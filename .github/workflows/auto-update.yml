name: Auto-update app versions

on:
  schedule:
    # Tous les jours à 6h00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Lancement manuel possible

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Run updater
        id: updater
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          APPSTORE_PATH: ${{ github.workspace }}
        run: python scripts/update_apps.py

      - name: Create Pull Request
        if: steps.updater.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: auto-update/app-versions
          delete-branch: true
          title: "chore: auto-update app versions"
          body: ${{ steps.updater.outputs.pr_body }}
          labels: auto-update